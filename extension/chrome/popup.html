<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V1 Helper</title>
  <link rel="stylesheet" href="../shared/popup/popup.css">
  <style>
    /* V1 Helper overrides — Trend Micro red accent */
    .popup-header h1 { color: #D71920; }
    .status-dot.connected {
      background-color: #D71920;
      box-shadow: 0 0 4px rgba(215, 25, 32, 0.5);
    }
    .toggle-button.enabled {
      color: #D71920;
      border-color: #D71920;
    }
    .toggle-button.enabled:hover { background-color: #fef2f2; }
    .toggle-button.disabled {
      background-color: #D71920;
      border-color: #D71920;
    }
    .toggle-button.disabled:hover {
      background-color: #b71518;
      border-color: #b71518;
    }
    .doc-link {
      color: #D71920;
      background-color: #fef2f2;
    }
    .doc-link:hover {
      background-color: #fde8e8;
      color: #b71518;
    }
    .settings-button.save { background-color: #D71920; }
    .settings-button.save:hover { background-color: #b71518; }

    /* V1 analysis section */
    .v1-section {
      padding: 12px 16px;
      margin-top: 8px;
      background: #fef2f2;
      border-radius: 8px;
      border: 1px solid #fde8e8;
    }
    .v1-section h3 {
      font-size: 12px;
      font-weight: 600;
      color: #D71920;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }
    .v1-stat {
      display: flex;
      justify-content: space-between;
      padding: 2px 0;
      font-size: 13px;
    }
    .v1-stat-label { color: #666; }
    .v1-stat-value { font-weight: 600; }
    .v1-import-btn {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      background: #D71920;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .v1-import-btn:hover { background: #b71518; }
    .v1-file-input { display: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="../shared/popup/popup.js"></script>
</body>
</html>
